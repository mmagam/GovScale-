<!DOCTYPE html>
<html lang="en">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0f172a",
              slate: "#334155",
              mist: "#e2e8f0",
              fog: "#f8fbff",
              accent: "#009BD8",
              accentSoft: "#dff4ff",
              magenta: "#C9319A",
              orange: "#FCAA28",

              teal: "#00D3B4",

            },

              glow: "0 24px 80px rgba(0, 155, 216, 0.14)",
              card: "0 18px 50px rgba(11, 37, 69, 0.10)"

    <style>
      :root {
        --dubai-blue: #009bd8;
        --dubai-magenta: #c9319a;
        --dubai-orange: #fcaa28;
        --dubai-red: #e5152e;
        --dubai-teal: #00d3b4;
        --ink: #0f172a;
        --navy: #0b2545;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(0, 155, 216, 0.16), transparent 26%),
          radial-gradient(circle at left center, rgba(201, 49, 154, 0.10), transparent 22%),
          linear-gradient(180deg, #f8fcff 0%, #eef5fb 55%, #f7f8fb 100%);
      }

      .skyline-hero {
        background:
          linear-gradient(135deg, rgba(11, 37, 69, 0.86), rgba(11, 37, 69, 0.66)),
          linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(11, 37, 69, 0.55)),
          url("https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1400&q=80");
        background-position: center;
        background-size: cover;
      }

      .glass {
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(10px);
      }

      .likert-option input:checked + span {
        background: var(--dubai-blue);
        color: #ffffff;
        border-color: var(--dubai-blue);
        box-shadow: 0 10px 24px rgba(0, 155, 216, 0.24);
      }

      .progress-fill {
        transition: width 260ms ease;
      }

      .fade-in {
        animation: fadeIn 240ms ease;
      }

      .fade-in-up {
        animation: fadeInUp 320ms ease both;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .executive-banner {
        background:
          linear-gradient(135deg, rgba(0, 155, 216, 0.96), rgba(11, 37, 69, 0.98)),
          radial-gradient(circle at top right, rgba(252, 170, 40, 0.25), transparent 35%);
      }

      .metric-chip {
        background: rgba(255, 255, 255, 0.14);
        border: 1px solid rgba(255, 255, 255, 0.18);
      }

      .gap-track {
        background: linear-gradient(90deg, rgba(226, 232, 240, 0.65), rgba(226, 232, 240, 0.95));
      }

      .gauge {
        --value: 0;
        --accent: var(--dubai-blue);
        background:
          radial-gradient(closest-side, white 68%, transparent 69% 100%),
          conic-gradient(
            from 220deg,
            var(--accent) calc((var(--value) / 5) * 280deg),
            rgba(203, 213, 225, 0.5) 0
          );
      }

      .gauge::before {
        content: "";
        position: absolute;
        inset: 18%;
        border-radius: 9999px;
        background: white;
      }

      .gauge::after {
        content: "";
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: var(--accent);
        bottom: 8%;
        left: 50%;
        transform: translateX(-50%);
        box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.95);
      }

      .card-surface {
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
        transition: box-shadow 200ms ease, transform 200ms ease;
      }

      .card-surface:hover {
        box-shadow: 0 14px 36px rgba(15, 23, 42, 0.10);
      }

      .avoid-break {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      @media print {
        * {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        body {
          background: #ffffff !important;
        }

        header,
        .no-print {
          display: none !important;
        }

        .print-stack {
          display: block !important;
        }

        .print-stack > * {
          width: 100% !important;
          max-width: none !important;
          margin-bottom: 18px !important;
        }

        .print-narrative-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        }

        .print-chart-box {
          min-height: 360px !important;
        }

        .avoid-break {
          break-inside: avoid !important;
          page-break-inside: avoid !important;
        }
      }
    </style>
  </head>
  <body class="min-h-screen text-ink">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8 lg:py-8">

          </div>
          <div class="flex flex-col gap-4 lg:items-end">

              <button

              <button

              <button

              </button>

            <div class="grid grid-cols-2 gap-3 text-sm sm:grid-cols-3">

            </div>
          </div>
        </div>
      </header>

      <main id="app" class="grid gap-6"></main>
    </div>

    <script>
      const assessmentData = [
        {
          id: "pillar1",
          name: "Purpose & Alignment",
          weight: 0.15,
          dimensions: [{ id: "mtp", name: "MTP", indexes: [0, 1, 2, 3] }],
          questions: [
            "1.1. Clear Ambition: Our organization has a highly ambitious, clearly written purpose that goes beyond basic service delivery to inspire significant, positive change for the public.",
            "1.2. Shared Understanding: Every team member, partner, and key stakeholder can easily explain our core purpose and why it matters.",
            "1.3. Daily Alignment: We use formal systems (like performance goals or project management tools) to ensure every daily task and strategic decision directly supports our core purpose.",
            "1.4. External Inspiration: Our core purpose is communicated so powerfully that it actively attracts top talent, partners, and public engagement to our organization."
          ]
        },
        {
          id: "pillar2",
          name: "Agility & Scaling",
          weight: 0.25,
          dimensions: [
            { id: "staff-on-demand", name: "Staff on Demand", indexes: [0, 1] },
            { id: "community-crowd", name: "Community & Crowd", indexes: [2, 3] },
            { id: "algorithms-ai", name: "Algorithms & AI", indexes: [4, 5] },
            { id: "leveraged-assets", name: "Leveraged Assets", indexes: [6, 7] },
            { id: "engagement-mechanics", name: "Engagement Mechanics", indexes: [8, 9] }
          ],
          questions: [
            "2.1. Flexible Talent Sourcing: We easily and instantly access a global pool of specialized external talent (like freelancers or experts) to form dynamic project teams, rather than relying only on full-time staff.",
            "2.2. Automated Talent Management: We use smart, automated systems to instantly identify skill gaps, find the right people (internal or external), and handle their contracts and payments.",
            "2.3. Active Community Collaboration: We have built a self-sustaining community of citizens and partners who actively help us co-create services, provide support, and improve our offerings.",
            "2.4. Utilizing Public Input (Crowdsourcing): We continuously and automatically gather input from the public (crowdsourcing) to improve our data accuracy and identify gaps in our services.",
            "2.5. Personalized Services: We use data and smart algorithms to provide a highly personalized, proactive experience for every citizen, anticipating what they need based on their specific life events.",
            "2.6. Intelligent Automation: Our core daily operations run on autonomous, smart systems that manage processes, allocate resources, and fix issues with very little human intervention.",
            "2.7. Asset Ownership Strategy: Rather than building and owning everything ourselves (like servers or physical infrastructure), we prioritize partnering with external platforms to access the best available technology.",
            "2.8. Open Data Connections (APIs): We provide secure, open connections (APIs) that allow external developers and partners to easily build new services on top of our existing data and platforms.",
            "2.9. Organic Public Engagement: Our digital services are so valuable and easy to use that citizens naturally engage with them and encourage others to do so, without us needing to spend heavily on marketing.",
            "2.10. Data-Driven Improvements: We continuously track how citizens use our services in real-time and use that data to automatically optimize their experience."
          ]
        },
        {
          id: "pillar3",
          name: "Internal Ops & Innovation",
          weight: 0.25,
          dimensions: [
            { id: "interfaces", name: "Interfaces", indexes: [0, 1] },
            { id: "dashboards", name: "Dashboards", indexes: [2, 3] },
            { id: "experimentation", name: "Experimentation", indexes: [4, 5] },
            { id: "autonomy", name: "Autonomy", indexes: [6, 7] },
            { id: "social-technologies", name: "Social Technologies", indexes: [8, 9] }
          ],
          questions: [
            "3.1. Seamless Partner Integration: We provide self-service digital portals that allow external partners to connect with our systems and share information seamlessly, without requiring manual work from our staff.",
            "3.2. Citizen-Centric Design: Our digital interfaces are designed entirely around the citizen's journey (e.g., \"starting a business\" or \"having a child\"), completely hiding the complexity of our internal government departments.",
            "3.3. Actionable Team Data: Our teams have real-time, predictive dashboards that not only track performance but automatically alert us to risks and create tasks when metrics fall behind.",
            "3.4. Strategic Leadership Insights: Our leadership uses advanced, real-time dashboards that compare our performance against peer organizations and run simulations to recommend the best strategic decisions.",
            "3.5. Culture of Experimentation: We actively encourage teams to rapidly test new ideas; we view \"intelligent failure\" as a valuable learning opportunity that is rewarded, not punished.",
            "3.6. Standardized Testing: We use a standardized, automated process to test new initiatives on small groups of users before a full launch, storing all results in a central database to share learnings.",
            "3.7. Empowered Teams: Instead of rigid hierarchies, we operate as a network of highly autonomous, multi-disciplinary teams that take full ownership of specific citizen services.",
            "3.8. Decentralized Decision Making: Frontline teams are empowered to make operational decisions quickly without needing multiple layers of management approval, allowing leadership to focus on long-term strategy.",
            "3.9. Modern Collaboration Tools: We use advanced digital workspaces that integrate our communication, project management, and knowledge sharing into one seamless platform.",
            "3.10. Transparent Communication: We practice \"working out loud,\" where internal discussions, decisions, and knowledge are openly accessible to the entire organization by default."
          ]
        },
        {
          id: "pillar4",
          name: "National Alignment",
          weight: 0.15,
          dimensions: [{ id: "national-strategy-alignment", name: "National Strategy Alignment", indexes: [0, 1, 2, 3] }],
          questions: [
            "4.1. Driving the National Vision: Our strategic roadmap is explicitly linked to the national economic vision, and we act as a primary driver for major national initiatives.",
            "4.2. Long-Term Future Planning: We maintain a dedicated focus on how our technology and services will evolve to support the country's long-term strategic plans (e.g., 50-year national visions).",
            "4.3. Leading in Artificial Intelligence: We are recognized as a pioneer in implementing the National Strategy for Artificial Intelligence, with a comprehensive plan covering data, talent, and ethics.",
            "4.4. Transparent Impact Reporting: We track our specific contributions to national performance indicators (KPIs) on a real-time, public-facing dashboard, serving as a model for other government entities."
          ]
        },
        {
          id: "pillar5",
          name: "Data Ecosystem",
          weight: 0.10,
          dimensions: [{ id: "data-ecosystem", name: "Data Ecosystem", indexes: [0, 1, 2] }],
          questions: [
            "5.1. Central Data Hub: We act as a central hub in the national data ecosystem, constantly sharing and receiving real-time data (like smart city sensors) to create smarter, interconnected services.",
            "5.2. Predictive Analytics: We use advanced analytics not just to predict future public needs, but to automatically recommend and execute the best solutions before problems occur.",
            "5.3. Real-Time Policy Simulation: We provide policymakers with a real-time \"digital twin\" (a virtual model of our operations) that allows them to test the impact of new policies safely before they are implemented."
          ]
        },
        {
          id: "pillar6",
          name: "Digital Platform",
          weight: 0.05,
          dimensions: [{ id: "platform-evolution", name: "Platform Evolution", indexes: [0, 1, 2] }],
          questions: [
            "6.1. Seamless Third-Party Integration: We operate a digital marketplace where citizens can access both our government services and approved private-sector services in one seamless experience.",
            "6.2. Enabling External Innovation: We provide the digital tools (like SDKs) that allow external developers to easily build and launch their own innovative services within our digital ecosystem.",
            "6.3. Advanced Payment Infrastructure: Our digital payment system functions as a major digital wallet, allowing citizens to easily handle both government fees and private transactions."
          ]
        },
        {
          id: "pillar7",
          name: "Future Foresight",
          weight: 0.05,
          dimensions: [{ id: "future-foresight", name: "Future Foresight", indexes: [0, 1, 2] }],
          questions: [
            "7.1. Continuous Trend Spotting: We have a dedicated team and automated systems that continuously scan for emerging global trends to maintain a clear view of the future.",
            "7.2. Adaptive Strategy: Our strategic plans and budgets are highly flexible, continuously updating in real-time based on the new trends and future signals we identify.",
            "7.3. Investing in the Future: We have a dedicated budget and \"innovation lab\" specifically designed to build prototypes and test disruptive, next-generation technologies."
          ]
        }
      ];

      const likertLabels = [
        { value: 1, label: "Strongly Disagree" },
        { value: 2, label: "Disagree" },
        { value: 3, label: "Neutral" },
        { value: 4, label: "Agree" },
        { value: 5, label: "Strongly Agree" }
      ];

      const overallStageComments = {
        Traditional:
          "Every exponential journey begins with a single bold step. Your organization has the foundational building blocks in place, and that is a position of immense potential. By committing to a Massive Transformative Purpose and embracing the power of technology and community, your entity can leapfrog traditional stages entirely. The future belongs to those who start building it today.",
        Emerging:
          "Your organization has already broken away from the traditional mold. You are in the 'digitizing' phase, where the seeds of exponential growth are being planted. The key principle of Exponential Organizations is that you do not need to own everything; you need to connect to everything. Focus on opening your platforms, engaging your community, and letting data guide your decisions.",
        Advanced:
          "This is where momentum becomes unstoppable. Your organization is operating with the agility, data fluency, and innovation culture that define the world's most admired institutions. At this stage, the exponential playbook calls for deepening autonomy within your teams, scaling through algorithms, and becoming a platform that others build upon. Continue pushing boundaries.",
        Exponential:
          "Exceptional. Your organization is not just future-ready; it is future-defining. You embody the core principles of an Exponential Organization: a purpose that inspires, technology that scales, and a culture that experiments fearlessly. At this level, your role shifts from transformation to leadership. Share your playbook and continue to push the frontier."
      };

      const pillarNarratives = {
        "Purpose & Alignment": {
          strong:
            "Your organization's purpose is not just a statement; it is a living force that aligns every decision. A clear MTP (Massive Transformative Purpose) attracts the best talent and the deepest public trust. You have mastered the most important pillar.",
          weak:
            "This is your highest-leverage opportunity. Defining and embedding a powerful purpose is the single most impactful action you can take. It costs nothing but changes everything. Start here, and every other pillar will accelerate."
        },
        "Agility & Scaling": {
          strong:
            "Your ability to scale without proportionally scaling costs is the hallmark of an exponential entity. By leveraging external talent, community intelligence, and smart automation, you are achieving more with less. Continue to push these boundaries.",
          weak:
            "The greatest unlock for any government entity is learning to scale impact without scaling bureaucracy. By embracing flexible talent models and intelligent automation, you can achieve 10x results with your current resources."
        },
        "Internal Ops & Innovation": {
          strong:
            "A culture that experiments, empowers its teams, and makes decisions with real-time data cannot be outpaced. Your internal operations reflect the IDEAS framework at a high level. This is the engine room of exponential growth.",
          weak:
            "Innovation is not about having the best ideas; it is about having the fastest learning cycles. By empowering frontline teams and creating safe spaces for experimentation, your organization can dramatically accelerate its ability to adapt."
        },
        "National Alignment": {
          strong:
            "Your strategic alignment with the national vision is exemplary. You are not merely complying with national directives; you are actively driving them. This positions your entity as a cornerstone of national progress.",
          weak:
            "Strengthening your connection to the national vision is a massive multiplier. Entities that explicitly link their roadmap to national KPIs receive greater support and deeper cross-government partnerships."
        },
        "Data Ecosystem": {
          strong:
            "Your organization is using data not just to report on the past, but to predict and shape the future. This predictive, ecosystem-connected approach is what makes government services truly intelligent.",
          weak:
            "Data is the most underutilized asset in government. By investing in data sharing and predictive analytics, your entity can move from reactive service delivery to proactive citizen engagement."
        },
        "Digital Platform": {
          strong:
            "You are evolving from a service provider into a platform. By enabling third parties to build on your ecosystem, you multiply your impact exponentially without multiplying your costs.",
          weak:
            "The shift from service provider to platform is highly transformative. By opening your ecosystem to external developers, you create a flywheel of innovation where others build value on top of your foundation."
        },
        "Future Foresight": {
          strong:
            "Organizations that invest in foresight do not just survive disruption; they lead it. Your structured approach to trend-spotting ensures that your entity will remain relevant and pioneering for decades to come.",
          weak:
            "In a world of accelerating change, the organizations that thrive are those that invest in seeing around corners. Establishing a structured foresight capability ensures your entity is never caught off guard."
        }
      };

      const pillarAccentMap = {
        "Purpose & Alignment": "#009BD8",
        "Agility & Scaling": "#C9319A",
        "Internal Ops & Innovation": "#FCAA28",
        "National Alignment": "#E5152E",
        "Data Ecosystem": "#00D3B4",
        "Digital Platform": "#009BD8",
        "Future Foresight": "#C9319A"
      };

      const state = {
        view: "login",
        currentPillarIndex: 0,
        auth: {
          loading: true,
          email: "",
          isAdmin: false,
          magicLinkSentTo: "",
          status: "",
          error: ""
        },
        user: {
          name: "",
          department: "",
          consent: false
        },
        responses: {},
        chart: null,
        adminChart: null,
        saveStatus: "",
        savedAssessmentKey: null,
        admin: {
          loading: false,
          error: "",
          records: [],
          departmentFilter: "all",
          startDate: "",
          endDate: "",
          sortKey: "finalScore",
          sortDirection: "desc",
          compareDepartments: []
        }
      };

      const app = document.getElementById("app");

      function render() {
        bindGlobalNav();
        if (state.auth.loading) {
          renderLoadingState();
        } else if (state.view === "login") {
          renderLogin();
        } else if (state.view === "landing") {
          renderLanding();
        } else if (state.view === "assessment") {
          renderAssessment();
        } else if (state.view === "admin") {
          if (!state.auth.isAdmin) {
            state.view = "landing";
            syncRoute();
            renderLanding();
            return;
          }
          renderAdminDashboard();
        } else {
          renderResults();
        }
      }

      function bindGlobalNav() {
        const assessmentButton = document.getElementById("assessmentNavButton");
        const adminButton = document.getElementById("adminNavButton");
        const logoutButton = document.getElementById("logoutButton");
        const authEmailLabel = document.getElementById("authEmailLabel");

        if (assessmentButton) {
          assessmentButton.classList.toggle("hidden", !state.auth.email);
        }

        if (adminButton) {
          adminButton.classList.toggle("hidden", !state.auth.isAdmin);
        }

        if (logoutButton) {
          logoutButton.classList.toggle("hidden", !state.auth.email);
        }

        if (authEmailLabel) {
          authEmailLabel.textContent = state.auth.email || "Not signed in";
        }

        if (assessmentButton && !assessmentButton.dataset.bound) {
          assessmentButton.dataset.bound = "true";
          assessmentButton.addEventListener("click", () => {
            state.view = state.auth.email ? "landing" : "login";
            syncRoute();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (adminButton && !adminButton.dataset.bound) {
          adminButton.dataset.bound = "true";
          adminButton.addEventListener("click", async () => {
            if (!state.auth.isAdmin) {
              state.view = "landing";
              syncRoute();
              render();
              return;
            }
            state.view = "admin";
            syncRoute();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
            if (!state.admin.records.length) {
              await loadAdminRecords();
            }
          });
        }

        if (logoutButton && !logoutButton.dataset.bound) {
          logoutButton.dataset.bound = "true";
          logoutButton.addEventListener("click", async () => {
            if (!firebaseAuth) return;
            await firebaseAuth.signOut();
            window.localStorage.removeItem(magicLinkStorageKey);
            state.auth.status = "You have been signed out.";
            state.auth.error = "";
            state.auth.email = "";
            state.auth.isAdmin = false;
            state.user.name = "";
            state.user.department = "";
            state.user.consent = false;
            state.responses = {};
            state.view = "login";
            syncRoute();
            render();
          });
        }
      }

      function renderLoadingState() {
        app.innerHTML = `
          <section class="fade-in-up mx-auto flex min-h-[50vh] w-full max-w-3xl items-center justify-center px-4 sm:px-6">
            <div class="glass card-surface w-full rounded-[28px] border border-white/70 p-8 text-center">
              <div class="mx-auto h-12 w-12 animate-pulse rounded-full bg-accentSoft"></div>
              <h2 class="mt-5 text-2xl font-semibold text-ink">Preparing GovScale</h2>

      function bindAssessmentEvents(pillar) {
        document.querySelectorAll("[data-pillarnav]").forEach((button) => {

            state.currentPillarIndex = Number(button.dataset.pillarnav);
            renderAssessment();
          });
        });

        const radios = document.querySelectorAll(`input[name^="${pillar.id}-"]`);
        radios.forEach((radio) => {
          radio.addEventListener("change", (event) => {
            const input = event.target;
            state.responses[input.name] = Number(input.value);
          });
        });

        const backButton = document.getElementById("backButton");
        const nextButton = document.getElementById("nextButton");

        if (backButton) {
          backButton.addEventListener("click", () => {
            if (state.currentPillarIndex > 0) {
              state.currentPillarIndex -= 1;
              syncRoute();
              render();
              window.scrollTo({ top: 0, behavior: "smooth" });
            }
          });
        }

        nextButton.addEventListener("click", () => {
          if (!isPillarComplete(pillar.id)) {
            alert("Please answer all questions in this pillar before continuing.");
            return;
          }

          if (state.currentPillarIndex < assessmentData.length - 1) {
            state.currentPillarIndex += 1;
            syncRoute();
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }

          state.view = "results";
          syncRoute();
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      }

      async function loadAdminRecords() {
        state.admin.loading = true;
        state.admin.error = "";
        renderAdminDashboard();

        if (!firestoreDb) {
          state.admin.loading = false;
          state.admin.error = "Firebase is not connected. Admin Dashboard cannot load records.";
          renderAdminDashboard();
          return;
        }

        try {
          const snapshot = await firestoreDb.collection("assessments").get();
          state.admin.records = snapshot.docs.map((doc) => normalizeAssessmentRecord(doc.id, doc.data()));
          state.admin.loading = false;
          renderAdminDashboard();
        } catch (error) {
          console.error("Failed to load admin records:", error);
          state.admin.loading = false;
          state.admin.error = "Failed to load assessments from Firestore.";
          renderAdminDashboard();
        }
      }

      function bindAdminControls() {
        const startDate = document.getElementById("adminStartDate");
        const endDate = document.getElementById("adminEndDate");
        const departmentFilter = document.getElementById("adminDepartmentFilter");
        const exportButton = document.getElementById("exportAdminPdfButton");
        const backButton = document.getElementById("adminBackButton");
        const sortButtons = document.querySelectorAll("[data-sort-key]");
        const compareCheckboxes = document.querySelectorAll('input[name="compareDepartments"]');

        if (startDate) {
          startDate.addEventListener("change", (event) => {
            state.admin.startDate = event.target.value;
            renderAdminDashboard();
          });
        }

        if (endDate) {
          endDate.addEventListener("change", (event) => {
            state.admin.endDate = event.target.value;
            renderAdminDashboard();
          });
        }

        if (departmentFilter) {
          departmentFilter.addEventListener("change", (event) => {
            state.admin.departmentFilter = event.target.value;
            renderAdminDashboard();
          });
        }

        compareCheckboxes.forEach((checkbox) => {
          checkbox.addEventListener("change", () => {
            const selected = Array.from(compareCheckboxes)
              .filter((input) => input.checked)
              .map((input) => input.value)
              .slice(0, 3);

            state.admin.compareDepartments = selected;
            renderAdminDashboard();
          });
        });

        sortButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const { sortKey } = button.dataset;
            if (state.admin.sortKey === sortKey) {
              state.admin.sortDirection = state.admin.sortDirection === "desc" ? "asc" : "desc";
            } else {
              state.admin.sortKey = sortKey;
              state.admin.sortDirection = "desc";
            }
            renderAdminDashboard();
          });
        });

        if (exportButton) {
          exportButton.addEventListener("click", () => {
            exportSectionToPdf("adminBoard", "organization-executive-report.pdf");
          });
        }

        if (backButton) {
          backButton.addEventListener("click", () => {
            state.view = "landing";
            syncRoute();
            render();
          });
        }
      }

      function getFilteredAdminRecords() {
        let records = [...state.admin.records];

        if (state.admin.departmentFilter !== "all") {
          records = records.filter((record) => record.department === state.admin.departmentFilter);
        }

        if (state.admin.startDate) {
          const start = new Date(`${state.admin.startDate}T00:00:00`);
          records = records.filter((record) => record.date >= start);
        }

        if (state.admin.endDate) {
          const end = new Date(`${state.admin.endDate}T23:59:59`);
          records = records.filter((record) => record.date <= end);
        }

        return records;
      }

      function getSortedAdminRecords(records) {
        const sorted = [...records];
        const direction = state.admin.sortDirection === "desc" ? -1 : 1;

        sorted.sort((a, b) => {
          const key = state.admin.sortKey;

          if (key === "department") return a.department.localeCompare(b.department) * direction;
          if (key === "respondent") return a.respondentName.localeCompare(b.respondentName) * direction;
          if (key === "date") return (a.date - b.date) * direction;
          if (key === "stage") return a.stage.localeCompare(b.stage) * direction;
          return (a.finalScore - b.finalScore) * direction;
        });

        return sorted;
      }

      function getDepartmentAggregates(records) {
        const groups = new Map();

        records.forEach((record) => {
          if (!groups.has(record.department)) {
            groups.set(record.department, []);
          }
          groups.get(record.department).push(record);
        });

        return Array.from(groups.entries()).map(([department, entries]) => {
          const isConfidential = entries.length < 3;
          const pillars = assessmentData.map((pillar) => {
            const average =
              entries.reduce((sum, entry) => {
                const match = entry.pillars.find((item) => item.name === pillar.name);
                return sum + (match ? match.average : 0);
              }, 0) / entries.length;

            return {
              name: pillar.name,
              average
            };
          });

          return {
            department,
            responseCount: entries.length,
            isConfidential,
            pillars,
            finalScore: entries.reduce((sum, entry) => sum + entry.finalScore, 0) / entries.length
          };
        });
      }

      function renderAdminCompareChart(departmentAggregates, compareDepartments) {
        const canvas = document.getElementById("adminRadarChart");
        if (!canvas) return;

        if (state.adminChart) {
          state.adminChart.destroy();
        }

        const palette = [
          { border: "rgba(0, 155, 216, 1)", fill: "rgba(0, 155, 216, 0.16)" },
          { border: "rgba(201, 49, 154, 1)", fill: "rgba(201, 49, 154, 0.16)" },
          { border: "rgba(0, 211, 180, 1)", fill: "rgba(0, 211, 180, 0.16)" }
        ];

        const datasets = compareDepartments
          .map((department, index) => {
            const aggregate = departmentAggregates.find((item) => item.department === department && !item.isConfidential);
            if (!aggregate) return null;
            const color = palette[index % palette.length];
            return {
              label: department,
              data: aggregate.pillars.map((pillar) => pillar.average.toFixed(2)),
              backgroundColor: color.fill,
              borderColor: color.border,
              borderWidth: 2.5,
              pointBackgroundColor: color.border,
              pointBorderColor: "#ffffff",
              pointHoverBackgroundColor: "#ffffff",
              pointHoverBorderColor: color.border
            };
          })
          .filter(Boolean);

        state.adminChart = new Chart(canvas, {
          type: "radar",
          data: {
            labels: assessmentData.map((pillar) => pillar.name),
            datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,

      function calculateResultsFromLookup(responseLookup) {
        const pillars = assessmentData.map((pillar) => {
          const values = pillar.questions.map((_, index) => Number(responseLookup[`${pillar.id}-${index}`] || 0));
          const total = values.reduce((sum, value) => sum + value, 0);
          const average = total / values.length;
          const weightedContribution = average * pillar.weight;
          const isStrong = average >= 3.5;
          const accent = pillarAccentMap[pillar.name];
          const dimensions = pillar.dimensions.map((dimension) => {
            const dimensionValues = dimension.indexes.map((index) => Number(responseLookup[`${pillar.id}-${index}`] || 0));
            const dimensionAverage = dimensionValues.reduce((sum, value) => sum + value, 0) / dimensionValues.length;
            return {
              name: dimension.name,
              average: dimensionAverage,
              gap: 5 - dimensionAverage
            };
          });

          return {
            id: pillar.id,
            name: pillar.name,
            weight: pillar.weight,
            average,
            weightedContribution,
            gap: 5 - average,
            accent,
            dimensions,
            statusLabel: isStrong ? "Strong" : "Growth Area",
            narrative: isStrong
              ? pillarNarratives[pillar.name].strong
              : pillarNarratives[pillar.name].weak,
            cardBackground: isStrong ? "rgba(0, 211, 180, 0.10)" : "rgba(252, 170, 40, 0.12)"
          };
        });

        const finalScore = pillars.reduce((sum, pillar) => sum + pillar.weightedContribution, 0);
        const stage = getMaturityStage(finalScore);

        return {
          finalScore,
          stage,
          overallComment: overallStageComments[stage],
          pillars
        };
      }

      function calculateResults() {
        return calculateResultsFromLookup(state.responses);
      }

      function getMaturityStage(score) {
        if (score <= 2.0) return "Traditional";
        if (score <= 3.0) return "Emerging";
        if (score <= 4.0) return "Advanced";
        return "Exponential";
      }

      function getStageTone(stage) {
        if (stage === "Traditional") {
          return {
            bgColor: "rgba(252, 170, 40, 0.16)",
            borderColor: "rgba(252, 170, 40, 0.4)",
            textColor: "#FCAA28"
          };
        }

        if (stage === "Emerging") {
          return {
            bgColor: "rgba(201, 49, 154, 0.16)",
            borderColor: "rgba(201, 49, 154, 0.38)",
            textColor: "#C9319A"
          };
        }

        if (stage === "Advanced") {
          return {
            bgColor: "rgba(0, 211, 180, 0.16)",
            borderColor: "rgba(0, 211, 180, 0.38)",
            textColor: "#00D3B4"
          };
        }

        return {
          bgColor: "rgba(0, 155, 216, 0.16)",
          borderColor: "rgba(0, 155, 216, 0.38)",
          textColor: "#009BD8"
        };
      }

      function isPillarComplete(pillarId) {
        const pillar = assessmentData.find((item) => item.id === pillarId);
        return pillar.questions.every((_, index) => state.responses[`${pillarId}-${index}`]);
      }

      function countAnsweredInPillar(pillarId) {
        const pillar = assessmentData.find((item) => item.id === pillarId);
        return pillar.questions.filter((_, index) => Boolean(state.responses[`${pillarId}-${index}`])).length;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDate(date) {
        return date.toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
      }

      function getHeatmapTone(score) {
        if (score <= 2.0) {
          return { background: "#E5152E", text: "#ffffff" };
        }
        if (score <= 3.0) {
          return { background: "#FCAA28", text: "#0f172a" };
        }
        if (score <= 4.0) {
          return { background: "#00D3B4", text: "#0f172a" };
        }
        return { background: "#009BD8", text: "#ffffff" };
      }

      function slugify(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-+|-+$/g, "");
      }

      function normalizeAssessmentRecord(id, data) {
        const responseLookup = {};
        (data.responses || []).forEach((item) => {
          responseLookup[`${item.pillarId}-${item.questionIndex}`] = item.value;
        });

        const computed = calculateResultsFromLookup(responseLookup);
        const date =
          data.createdAt && typeof data.createdAt.toDate === "function"
            ? data.createdAt.toDate()
            : new Date(data.submittedAtIso || Date.now());

        return {
          id,
          email: data.email || data.respondent?.email || "",
          department: data.respondent?.department || "Unknown Department",
          respondentName: data.respondent?.name || "Unknown Respondent",
          date,
          finalScore: typeof data.finalScore === "number" ? data.finalScore : computed.finalScore,
          stage: data.maturityStage || computed.stage,
          pillars: computed.pillars,
          responseLookup,
          consent: Boolean(data.consent)
        };
      }

      async function exportSectionToPdf(sectionId, filename) {
        const target = document.getElementById(sectionId);
        if (!target || !window.html2canvas || !window.jspdf) {
          window.print();
          return;
        }

        await new Promise((resolve) => window.requestAnimationFrame(() => setTimeout(resolve, 220)));

        const canvas = await window.html2canvas(target, {
          scale: 2.4,
          useCORS: true,
          backgroundColor: "#f8fcff"
        });

        const image = canvas.toDataURL("image/png");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF(sectionId === "adminBoard" ? "l" : "p", "mm", "a4");
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const imageWidth = pageWidth - 12;
        const imageHeight = (canvas.height * imageWidth) / canvas.width;

        let remainingHeight = imageHeight;
        let position = 6;

        pdf.addImage(image, "PNG", 6, position, imageWidth, imageHeight);
        remainingHeight -= pageHeight;

        while (remainingHeight > 0) {
          position = remainingHeight - imageHeight + 6;
          pdf.addPage();
          pdf.addImage(image, "PNG", 6, position, imageWidth, imageHeight);
          remainingHeight -= pageHeight;
        }

        pdf.save(filename);
      }

      function syncRoute() {
        const hash = state.view === "admin" ? "#admin" : state.view === "assessment" ? "#assessment" : state.view === "results" ? "#results" : "";
        const nextUrl = `${window.location.pathname}${hash}`;
        window.history.replaceState({}, "", nextUrl);
      }

      function applyRouteGuard() {
        const hash = window.location.hash.replace("#", "");
        if (hash === "admin" && state.auth.isAdmin) {
          state.view = "admin";
          return;
        }
        if (hash === "results" && state.auth.email) {
          state.view = "results";
          return;
        }
        if (hash === "assessment" && state.auth.email) {
          state.view = "assessment";
          return;
        }
        state.view = state.auth.email ? "landing" : "login";
        syncRoute();
      }

      async function checkAdminAccess(email) {
        if (!firestoreDb || !email) return false;
        try {
          const configDoc = await firestoreDb.collection("config").doc("admins").get();
          const admins = configDoc.exists ? configDoc.data().emails || [] : [];
          return admins.map((item) => String(item).toLowerCase()).includes(String(email).toLowerCase());
        } catch (error) {
          console.error("Failed to resolve admin access:", error);
          return false;
        }
      }

      async function completeMagicLinkSignIn() {
        if (!firebaseAuth || !firebaseAuth.isSignInWithEmailLink(window.location.href)) return;

        let email = window.localStorage.getItem(magicLinkStorageKey) || "";
        if (!email) {
          email = window.prompt("Confirm your government email address to complete sign-in:") || "";
        }

        if (!email) {
          state.auth.loading = false;
          state.auth.error = "Email confirmation is required to complete magic link sign-in.";
          state.view = "login";
          render();
          return;
        }

        try {
          await firebaseAuth.signInWithEmailLink(email, window.location.href);
          window.localStorage.removeItem(magicLinkStorageKey);
          window.history.replaceState({}, "", window.location.pathname);
        } catch (error) {
          console.error("Magic link sign-in failed:", error);
          state.auth.loading = false;
          state.auth.error = "The magic link is invalid or expired. Please request a new one.";
          state.auth.status = "";
          state.view = "login";
          render();
        }
      }

      async function initializeAuthSession() {
        if (!firebaseAuth) {
          state.auth.loading = false;
          state.auth.error = "Firebase Authentication is not configured.";
          state.view = "login";
          render();
          return;
        }

        await completeMagicLinkSignIn();

        firebaseAuth.onAuthStateChanged(async (user) => {
          state.auth.loading = false;
          state.auth.email = user?.email || "";
          state.auth.isAdmin = await checkAdminAccess(state.auth.email);
          state.auth.error = "";
          if (user?.email) {
            state.auth.status = "";
            state.auth.magicLinkSentTo = user.email;
          }
          applyRouteGuard();
          render();
          if (state.view === "admin" && state.auth.isAdmin && !state.admin.records.length) {
            await loadAdminRecords();
          }
        });

        window.addEventListener("hashchange", () => {
          applyRouteGuard();
          render();
        });
      }

      function updateSaveStatus() {
        const saveStatusElement = document.getElementById("saveStatus");
        if (saveStatusElement) {
          saveStatusElement.textContent =
            state.saveStatus ||
            "Assessment persistence is ready. Results will save to Firestore after the scorecard renders.";
        }
      }

      async function persistAssessment(results) {
        const assessmentKey = JSON.stringify({
          name: state.user.name,
          department: state.user.department,
          responses: state.responses
        });

        if (state.savedAssessmentKey === assessmentKey) {
          return;
        }

        if (!firestoreDb) {
          state.saveStatus = "Firebase is not connected yet. Results are visible locally, but this run was not stored in Firestore.";
          updateSaveStatus();
          return;
        }

        state.saveStatus = "Saving this assessment to Firestore...";
        updateSaveStatus();

        const submittedAt = new Date();
        const responses = assessmentData.flatMap((pillar) =>
          pillar.questions.map((question, index) => ({
            pillarId: pillar.id,
            pillarName: pillar.name,
            questionIndex: index,
            question,
            value: state.responses[`${pillar.id}-${index}`]
          }))
        );

        try {
          const docRef = await firestoreDb.collection("assessments").add({
            email: state.auth.email,
            respondent: {
              name: state.user.name,
              department: state.user.department,
              email: state.auth.email
            },
            consent: state.user.consent,
            finalScore: Number(results.finalScore.toFixed(2)),
            maturityStage: results.stage,
            overallComment: results.overallComment,
            pillars: results.pillars.map((pillar) => ({
              name: pillar.name,
              weight: pillar.weight,
              average: Number(pillar.average.toFixed(2)),
              weightedContribution: Number(pillar.weightedContribution.toFixed(2)),
              gap: Number(pillar.gap.toFixed(2)),
              statusLabel: pillar.statusLabel,
              narrative: pillar.narrative
            })),
            responses,
            submittedAtIso: submittedAt.toISOString(),
            createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
          });

          state.savedAssessmentKey = assessmentKey;
          state.saveStatus = `Saved to Firestore successfully. Record ID: ${docRef.id}`;
          updateSaveStatus();
        } catch (error) {
          console.error("Failed to save assessment:", error);
          state.saveStatus = "Firestore save failed. Check your browser console and Firebase rules, then try again.";
          updateSaveStatus();
        }
      }

      initializeAuthSession();
